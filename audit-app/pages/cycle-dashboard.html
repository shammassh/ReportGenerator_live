<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cycle Dashboard - Food Safety Audit System</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            background: white;
            border-radius: 15px;
            padding: 25px 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .header h1 {
            font-size: 28px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .back-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            cursor: pointer;
        }

        .back-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        /* Filters */
        .filters-section {
            background: white;
            border-radius: 15px;
            padding: 20px 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            flex: 1;
            min-width: 300px;
        }

        .filter-group label {
            font-weight: 600;
            color: #333;
            font-size: 13px;
        }

        .filter-group select {
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            transition: all 0.3s;
            background: white;
            cursor: pointer;
        }

        .filter-group select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2);
        }

        .cycle-info {
            background: linear-gradient(135deg, #f0f4ff 0%, #e8ecff 100%);
            padding: 12px 20px;
            border-radius: 10px;
            border: 1px solid #667eea;
        }

        .cycle-info-label {
            font-size: 11px;
            color: #667eea;
            text-transform: uppercase;
            font-weight: 600;
        }

        .cycle-info-value {
            font-size: 18px;
            font-weight: 700;
            color: #333;
        }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            text-align: center;
            transition: all 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-card.total {
            border-top: 4px solid #667eea;
        }

        .stat-card.audited {
            border-top: 4px solid #10b981;
        }

        .stat-card.pending {
            border-top: 4px solid #f59e0b;
        }

        .stat-card.progress {
            border-top: 4px solid #8b5cf6;
        }

        .stat-icon {
            font-size: 32px;
            margin-bottom: 10px;
        }

        .stat-value {
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .stat-card.total .stat-value { color: #667eea; }
        .stat-card.audited .stat-value { color: #10b981; }
        .stat-card.pending .stat-value { color: #f59e0b; }
        .stat-card.progress .stat-value { color: #8b5cf6; }

        .stat-label {
            font-size: 14px;
            color: #666;
            font-weight: 500;
        }

        /* Progress Bar Section */
        .progress-section {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .progress-title {
            font-size: 18px;
            font-weight: 600;
            color: #333;
        }

        .progress-percentage {
            font-size: 24px;
            font-weight: 700;
            color: #667eea;
        }

        .progress-bar-container {
            background: #e0e0e0;
            border-radius: 10px;
            height: 24px;
            overflow: hidden;
            position: relative;
        }

        .progress-bar {
            height: 100%;
            border-radius: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transition: width 0.5s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 12px;
        }

        .progress-bar.low {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
        }

        .progress-bar.medium {
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
        }

        .progress-bar.high {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
        }

        /* Tables Section */
        .tables-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
            gap: 20px;
        }

        @media (max-width: 1100px) {
            .tables-grid {
                grid-template-columns: 1fr;
            }
        }

        .table-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        .table-header {
            padding: 20px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .table-header.pending {
            background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%);
            border-bottom: 2px solid #f59e0b;
        }

        .table-header.audited {
            background: linear-gradient(135deg, #d1fae5 0%, #a7f3d0 100%);
            border-bottom: 2px solid #10b981;
        }

        .table-title {
            font-size: 18px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .table-header.pending .table-title { color: #92400e; }
        .table-header.audited .table-title { color: #065f46; }

        .table-count {
            background: white;
            padding: 6px 14px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 14px;
        }

        .table-header.pending .table-count { color: #f59e0b; }
        .table-header.audited .table-count { color: #10b981; }

        .table-body {
            padding: 0;
            max-height: 400px;
            overflow-y: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        table th {
            background: #f8fafc;
            padding: 12px 16px;
            text-align: left;
            font-size: 12px;
            font-weight: 600;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            position: sticky;
            top: 0;
            z-index: 1;
        }

        table td {
            padding: 12px 16px;
            border-bottom: 1px solid #e2e8f0;
            font-size: 14px;
            color: #333;
        }

        table tr:hover {
            background: #f8fafc;
        }

        .store-name {
            font-weight: 600;
            color: #333;
        }

        .brand-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            background: #e0e7ff;
            color: #4338ca;
        }

        .score-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 13px;
        }

        .score-badge.pass {
            background: #d1fae5;
            color: #065f46;
        }

        .score-badge.fail {
            background: #fee2e2;
            color: #991b1b;
        }

        .audit-date {
            color: #64748b;
            font-size: 13px;
        }

        .empty-state {
            padding: 40px;
            text-align: center;
            color: #94a3b8;
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 10px;
        }

        /* Loading State */
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 60px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #e0e0e0;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 15px 25px;
            border-radius: 10px;
            color: white;
            font-weight: 500;
            z-index: 2000;
            transform: translateX(150%);
            transition: transform 0.3s ease;
        }

        .toast.show {
            transform: translateX(0);
        }

        .toast.success {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
        }

        .toast.error {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                text-align: center;
            }

            .header h1 {
                font-size: 22px;
            }

            .filters-section {
                flex-direction: column;
            }

            .filter-group {
                min-width: 100%;
            }

            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .stat-value {
                font-size: 28px;
            }
        }

        /* View Toggle */
        .view-toggle {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .view-btn {
            padding: 12px 24px;
            border: 2px solid #667eea;
            background: white;
            color: #667eea;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
        }

        .view-btn:hover {
            background: #f0f4ff;
        }

        .view-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: transparent;
        }

        /* All Stores Table */
        .all-stores-section {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            overflow: hidden;
            margin-bottom: 20px;
        }

        .all-stores-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .all-stores-header .table-title {
            color: white;
        }

        .all-stores-header .table-count {
            background: rgba(255,255,255,0.2);
            color: white;
        }

        .search-box {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .search-box input {
            padding: 10px 16px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            width: 250px;
        }

        .search-box input:focus {
            outline: none;
            box-shadow: 0 0 0 3px rgba(255,255,255,0.3);
        }

        .all-stores-body {
            max-height: 600px;
            overflow-y: auto;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 12px;
        }

        .status-badge.audited {
            background: #d1fae5;
            color: #065f46;
        }

        .status-badge.pending {
            background: #fef3c7;
            color: #92400e;
        }

        .cycle-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            background: #e0e7ff;
            color: #4338ca;
        }

        .schema-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            background: #f3e8ff;
            color: #7c3aed;
        }

        /* Auto-refresh controls */
        .refresh-controls {
            display: flex;
            align-items: center;
            gap: 15px;
            background: #f0f4ff;
            padding: 10px 15px;
            border-radius: 10px;
            margin-left: auto;
        }

        .last-updated {
            font-size: 12px;
            color: #666;
        }

        .refresh-btn {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
        }

        .refresh-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.4);
        }

        .refresh-btn.spinning .refresh-icon {
            animation: spin 1s linear infinite;
        }

        .auto-refresh-toggle {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: #555;
        }

        .auto-refresh-toggle input {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .countdown {
            font-size: 11px;
            color: #667eea;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="header-left">
                <h1>🔄 Cycle Dashboard</h1>
            </div>
            <div class="refresh-controls">
                <span class="last-updated" id="lastUpdated">Last updated: --</span>
                <label class="auto-refresh-toggle">
                    <input type="checkbox" id="autoRefreshToggle" checked onchange="toggleAutoRefresh()">
                    Auto-refresh
                    <span class="countdown" id="countdown">(30s)</span>
                </label>
                <button class="refresh-btn" id="refreshBtn" onclick="manualRefresh()">
                    <span class="refresh-icon">🔄</span> Refresh
                </button>
            </div>
            <a href="/dashboard" class="back-btn">
                <span>←</span> Back to Dashboard
            </a>
        </div>

        <!-- View Toggle -->
        <div class="view-toggle">
            <button class="view-btn active" id="schemaViewBtn" onclick="switchView('schema')">
                📋 By Schema
            </button>
            <button class="view-btn" id="allStoresViewBtn" onclick="switchView('allStores')">
                🏪 All Stores
            </button>
        </div>

        <!-- SCHEMA VIEW -->
        <div id="schemaView">
            <!-- Filters -->
            <div class="filters-section">
                <div class="filter-group">
                    <label>📋 Select Schema (Checklist Type)</label>
                    <select id="schemaSelect" onchange="onSchemaChange()">
                        <option value="">-- Select Schema --</option>
                    </select>
                </div>
                <div class="filter-group" id="cycleSelectGroup" style="display: none; min-width: 200px;">
                    <label>🔄 Select Cycle</label>
                    <select id="cycleSelect" onchange="loadCycleData()">
                        <option value="">-- Select Cycle --</option>
                    </select>
                </div>
                <div class="cycle-info" id="cycleInfo" style="display: none;">
                    <div class="cycle-info-label">Viewing Cycle</div>
                    <div class="cycle-info-value" id="currentCycleDisplay">-</div>
                </div>
                <div class="cycle-info" id="cycleTypeInfo" style="display: none;">
                    <div class="cycle-info-label">Cycle Type</div>
                    <div class="cycle-info-value" id="cycleTypeDisplay">-</div>
                </div>
            </div>

            <!-- Stats Cards -->
            <div class="stats-grid" id="statsGrid" style="display: none;">
                <div class="stat-card total">
                    <div class="stat-icon">🏪</div>
                    <div class="stat-value" id="totalStores">0</div>
                    <div class="stat-label">Total Stores</div>
                </div>
                <div class="stat-card audited">
                    <div class="stat-icon">✅</div>
                    <div class="stat-value" id="auditedStores">0</div>
                    <div class="stat-label">Audited</div>
                </div>
                <div class="stat-card pending">
                    <div class="stat-icon">⏳</div>
                    <div class="stat-value" id="pendingStores">0</div>
                    <div class="stat-label">Pending</div>
                </div>
                <div class="stat-card progress">
                    <div class="stat-icon">📊</div>
                    <div class="stat-value" id="progressPercent">0%</div>
                    <div class="stat-label">Progress</div>
                </div>
            </div>

            <!-- Progress Bar -->
            <div class="progress-section" id="progressSection" style="display: none;">
                <div class="progress-header">
                    <span class="progress-title">Cycle Completion Progress</span>
                    <span class="progress-percentage" id="progressValue">0%</span>
                </div>
                <div class="progress-bar-container">
                    <div class="progress-bar" id="progressBar" style="width: 0%;">0%</div>
                </div>
            </div>

            <!-- Tables -->
            <div class="tables-grid" id="tablesGrid" style="display: none;">
            <!-- Pending Stores -->
            <div class="table-card">
                <div class="table-header pending">
                    <div class="table-title">⏳ Pending Stores</div>
                    <div class="table-count" id="pendingCount">0</div>
                </div>
                <div class="table-body" id="pendingTableBody">
                    <div class="loading">
                        <div class="spinner"></div>
                    </div>
                </div>
            </div>

            <!-- Audited Stores -->
            <div class="table-card">
                <div class="table-header audited">
                    <div class="table-title">✅ Audited Stores</div>
                    <div class="table-count" id="auditedCount">0</div>
                </div>
                <div class="table-body" id="auditedTableBody">
                    <div class="loading">
                        <div class="spinner"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Initial State -->
        <div class="table-card" id="initialState">
            <div class="empty-state">
                <div class="empty-state-icon">📋</div>
                <p>Select a schema to view cycle progress</p>
            </div>
        </div>
        </div><!-- End Schema View -->

        <!-- ALL STORES VIEW -->
        <div id="allStoresView" style="display: none;">
            <div class="all-stores-section">
                <div class="all-stores-header">
                    <div class="table-title">🏪 All Stores - Current Cycle Status</div>
                    <div class="search-box">
                        <input type="text" id="storeSearch" placeholder="🔍 Search stores..." oninput="filterAllStores()">
                    </div>
                    <div class="table-count" id="allStoresCount">0 stores</div>
                </div>
                <div class="all-stores-body" id="allStoresTableBody">
                    <div class="loading">
                        <div class="spinner"></div>
                    </div>
                </div>
            </div>
        </div><!-- End All Stores View -->
    </div>

    <div class="toast" id="toast"></div>

    <script>
        let schemas = [];
        let currentSchemaData = null;
        let allStoresData = [];
        let currentView = 'schema';
        let cycleDefinitions = []; // Store cycle definitions for selected schema
        let selectedCycle = null; // Currently selected cycle
        
        // Auto-refresh settings
        let autoRefreshEnabled = true;
        let autoRefreshInterval = 30; // seconds
        let countdownTimer = null;
        let refreshTimer = null;
        let currentCountdown = autoRefreshInterval;

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadSchemas();
            startAutoRefresh();
        });

        // Auto-refresh functions
        function startAutoRefresh() {
            if (autoRefreshEnabled) {
                currentCountdown = autoRefreshInterval;
                updateCountdownDisplay();
                
                // Countdown timer
                countdownTimer = setInterval(() => {
                    currentCountdown--;
                    updateCountdownDisplay();
                    
                    if (currentCountdown <= 0) {
                        currentCountdown = autoRefreshInterval;
                        refreshCurrentView();
                    }
                }, 1000);
            }
        }

        function stopAutoRefresh() {
            if (countdownTimer) {
                clearInterval(countdownTimer);
                countdownTimer = null;
            }
        }

        function toggleAutoRefresh() {
            autoRefreshEnabled = document.getElementById('autoRefreshToggle').checked;
            
            if (autoRefreshEnabled) {
                startAutoRefresh();
            } else {
                stopAutoRefresh();
                document.getElementById('countdown').textContent = '(paused)';
            }
        }

        function updateCountdownDisplay() {
            document.getElementById('countdown').textContent = `(${currentCountdown}s)`;
        }

        function updateLastUpdated() {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('en-US', { 
                hour: '2-digit', 
                minute: '2-digit', 
                second: '2-digit' 
            });
            document.getElementById('lastUpdated').textContent = `Last updated: ${timeStr}`;
        }

        async function manualRefresh() {
            const btn = document.getElementById('refreshBtn');
            btn.classList.add('spinning');
            
            await refreshCurrentView();
            
            setTimeout(() => btn.classList.remove('spinning'), 500);
            
            // Reset countdown
            currentCountdown = autoRefreshInterval;
        }

        async function refreshCurrentView() {
            if (currentView === 'schema') {
                const schemaId = document.getElementById('schemaSelect').value;
                if (schemaId) {
                    await loadCycleData();
                }
            } else if (currentView === 'allStores') {
                await loadAllStores();
            }
            updateLastUpdated();
        }

        // Switch between views
        function switchView(view) {
            currentView = view;
            
            // Update buttons
            document.getElementById('schemaViewBtn').classList.toggle('active', view === 'schema');
            document.getElementById('allStoresViewBtn').classList.toggle('active', view === 'allStores');
            
            // Toggle views
            document.getElementById('schemaView').style.display = view === 'schema' ? 'block' : 'none';
            document.getElementById('allStoresView').style.display = view === 'allStores' ? 'block' : 'none';
            
            // Load all stores data if switching to that view
            if (view === 'allStores' && allStoresData.length === 0) {
                loadAllStores();
            }
        }

        // Load all stores with cycle info
        async function loadAllStores() {
            try {
                const container = document.getElementById('allStoresTableBody');
                container.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
                
                const response = await fetch('/api/cycle-dashboard/all-stores');
                const data = await response.json();
                
                if (data.success) {
                    allStoresData = data.stores;
                    renderAllStores(allStoresData);
                    updateLastUpdated();
                } else {
                    showToast('Failed to load stores', 'error');
                }
            } catch (error) {
                console.error('Error loading all stores:', error);
                showToast('Failed to load stores', 'error');
            }
        }

        // Render all stores table
        function renderAllStores(stores) {
            const container = document.getElementById('allStoresTableBody');
            document.getElementById('allStoresCount').textContent = `${stores.length} stores`;
            
            if (!stores || stores.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">🏪</div>
                        <p>No stores found</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = `
                <table>
                    <thead>
                        <tr>
                            <th>Store</th>
                            <th>Brand</th>
                            <th>Schema</th>
                            <th>Cycle Type</th>
                            <th>Current Cycle</th>
                            <th>Status</th>
                            <th>Score</th>
                            <th>Audit Date</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${stores.map(store => {
                            const statusClass = store.status === 'Audited' ? 'audited' : 'pending';
                            const scoreHtml = store.score 
                                ? `<span class="score-badge ${store.score >= 83 ? 'pass' : 'fail'}">${store.score}%</span>`
                                : '-';
                            return `
                            <tr>
                                <td class="store-name">${escapeHtml(store.storeName)}</td>
                                <td><span class="brand-badge">${escapeHtml(store.brand || 'N/A')}</span></td>
                                <td><span class="schema-badge">${escapeHtml(store.schemaName || 'N/A')}</span></td>
                                <td>${escapeHtml(store.cycleTypeName || 'N/A')}</td>
                                <td><span class="cycle-badge">🔄 Cycle ${store.currentCycle || '-'} / ${store.cyclesPerYear || '-'}</span></td>
                                <td><span class="status-badge ${statusClass}">${store.status}</span></td>
                                <td>${scoreHtml}</td>
                                <td class="audit-date">${store.auditDate ? formatDate(store.auditDate) : '-'}</td>
                            </tr>
                        `}).join('')}
                    </tbody>
                </table>
            `;
        }

        // Filter all stores by search
        function filterAllStores() {
            const searchTerm = document.getElementById('storeSearch').value.toLowerCase();
            
            if (!searchTerm) {
                renderAllStores(allStoresData);
                return;
            }
            
            const filtered = allStoresData.filter(store => 
                (store.storeName && store.storeName.toLowerCase().includes(searchTerm)) ||
                (store.brand && store.brand.toLowerCase().includes(searchTerm)) ||
                (store.schemaName && store.schemaName.toLowerCase().includes(searchTerm)) ||
                (store.status && store.status.toLowerCase().includes(searchTerm))
            );
            
            renderAllStores(filtered);
        }

        // Load schemas for dropdown
        async function loadSchemas() {
            try {
                const response = await fetch('/api/cycle-dashboard/schemas');
                const data = await response.json();
                
                if (data.success) {
                    schemas = data.schemas;
                    populateSchemaDropdown();
                } else {
                    showToast('Failed to load schemas', 'error');
                }
            } catch (error) {
                console.error('Error loading schemas:', error);
                showToast('Failed to load schemas', 'error');
            }
        }

        // Populate schema dropdown
        function populateSchemaDropdown() {
            const select = document.getElementById('schemaSelect');
            select.innerHTML = '<option value="">-- Select Schema --</option>';
            
            // Group schemas by brand
            const groupedSchemas = {};
            schemas.forEach(schema => {
                const brand = schema.brand || 'Other';
                if (!groupedSchemas[brand]) {
                    groupedSchemas[brand] = [];
                }
                groupedSchemas[brand].push(schema);
            });

            // Create optgroups
            Object.keys(groupedSchemas).sort().forEach(brand => {
                const optgroup = document.createElement('optgroup');
                optgroup.label = brand;
                
                groupedSchemas[brand].forEach(schema => {
                    const option = document.createElement('option');
                    option.value = schema.schemaId;
                    option.textContent = `${schema.schemaName} (${schema.cycleTypeName})`;
                    option.dataset.cycleType = schema.cycleTypeName;
                    option.dataset.cyclesPerYear = schema.cyclesPerYear;
                    option.dataset.cycleTypeId = schema.cycleTypeId;
                    optgroup.appendChild(option);
                });
                
                select.appendChild(optgroup);
            });
        }

        // Handle schema change - load cycle definitions
        async function onSchemaChange() {
            const schemaId = document.getElementById('schemaSelect').value;
            
            if (!schemaId) {
                document.getElementById('cycleSelectGroup').style.display = 'none';
                document.getElementById('statsGrid').style.display = 'none';
                document.getElementById('progressSection').style.display = 'none';
                document.getElementById('tablesGrid').style.display = 'none';
                document.getElementById('initialState').style.display = 'block';
                document.getElementById('cycleInfo').style.display = 'none';
                document.getElementById('cycleTypeInfo').style.display = 'none';
                return;
            }

            // Get the schema's cycle type
            const selectedOption = document.getElementById('schemaSelect').selectedOptions[0];
            const cycleTypeId = selectedOption.dataset.cycleTypeId;
            
            // Load cycle definitions for this schema
            try {
                const response = await fetch(`/api/cycle-dashboard/cycle-definitions?schemaId=${schemaId}`);
                const data = await response.json();
                
                if (data.success) {
                    cycleDefinitions = data.cycles;
                    populateCycleDropdown(data.currentCycle);
                    document.getElementById('cycleSelectGroup').style.display = 'block';
                    
                    // Auto-select current cycle and load data
                    loadCycleData();
                }
            } catch (error) {
                console.error('Error loading cycle definitions:', error);
                showToast('Failed to load cycle options', 'error');
            }
        }

        // Populate cycle dropdown
        function populateCycleDropdown(currentCycle) {
            const select = document.getElementById('cycleSelect');
            select.innerHTML = '';
            
            cycleDefinitions.forEach(cycle => {
                const option = document.createElement('option');
                option.value = cycle.cycleNumber;
                const isCurrent = cycle.cycleNumber === currentCycle;
                option.textContent = `${cycle.cycleNumber} (${cycle.displayName})${isCurrent ? ' ← Current' : ''}`;
                option.selected = isCurrent;
                if (isCurrent) {
                    option.style.fontWeight = 'bold';
                }
                select.appendChild(option);
            });
            
            selectedCycle = currentCycle;
        }

        // Load cycle data for selected schema and cycle
        async function loadCycleData() {
            const schemaId = document.getElementById('schemaSelect').value;
            const cycleSelect = document.getElementById('cycleSelect');
            const selectedCycleValue = cycleSelect.value;
            
            if (!schemaId || !selectedCycleValue) {
                document.getElementById('statsGrid').style.display = 'none';
                document.getElementById('progressSection').style.display = 'none';
                document.getElementById('tablesGrid').style.display = 'none';
                document.getElementById('initialState').style.display = 'block';
                document.getElementById('cycleInfo').style.display = 'none';
                document.getElementById('cycleTypeInfo').style.display = 'none';
                return;
            }
            
            selectedCycle = selectedCycleValue;

            try {
                // Show loading
                document.getElementById('initialState').style.display = 'none';
                document.getElementById('statsGrid').style.display = 'grid';
                document.getElementById('progressSection').style.display = 'block';
                document.getElementById('tablesGrid').style.display = 'grid';
                document.getElementById('cycleInfo').style.display = 'block';
                document.getElementById('cycleTypeInfo').style.display = 'block';

                // Fetch data with selected cycle
                const [progressRes, pendingRes, auditedRes] = await Promise.all([
                    fetch(`/api/cycle-dashboard/progress?schemaId=${schemaId}&cycle=${encodeURIComponent(selectedCycle)}`),
                    fetch(`/api/cycle-dashboard/pending-stores?schemaId=${schemaId}&cycle=${encodeURIComponent(selectedCycle)}`),
                    fetch(`/api/cycle-dashboard/audited-stores?schemaId=${schemaId}&cycle=${encodeURIComponent(selectedCycle)}`)
                ]);

                const progressData = await progressRes.json();
                const pendingData = await pendingRes.json();
                const auditedData = await auditedRes.json();

                if (progressData.success) {
                    updateStats(progressData);
                    updateProgressBar(progressData.progress);
                }

                if (pendingData.success) {
                    // Get the display name for selected cycle
                    const cycleDef = cycleDefinitions.find(c => c.cycleNumber === selectedCycle);
                    const cycleName = cycleDef ? cycleDef.displayName : '';
                    renderPendingStores(pendingData.stores, selectedCycle, cycleName);
                }

                if (auditedData.success) {
                    renderAuditedStores(auditedData.stores);
                }

                updateLastUpdated();

            } catch (error) {
                console.error('Error loading cycle data:', error);
                showToast('Failed to load cycle data', 'error');
            }
        }

        // Update stats cards
        function updateStats(data) {
            document.getElementById('totalStores').textContent = data.totalStores || 0;
            document.getElementById('auditedStores').textContent = data.auditedCount || 0;
            document.getElementById('pendingStores').textContent = data.pendingCount || 0;
            document.getElementById('progressPercent').textContent = `${data.progress || 0}%`;
            
            // Update cycle info
            document.getElementById('currentCycleDisplay').textContent = data.currentCycle || '-';
            document.getElementById('cycleTypeDisplay').textContent = data.cycleTypeName || '-';
            
            // Update counts in table headers
            document.getElementById('pendingCount').textContent = data.pendingCount || 0;
            document.getElementById('auditedCount').textContent = data.auditedCount || 0;
        }

        // Update progress bar
        function updateProgressBar(progress) {
            const bar = document.getElementById('progressBar');
            const value = document.getElementById('progressValue');
            
            bar.style.width = `${progress}%`;
            bar.textContent = `${progress}%`;
            value.textContent = `${progress}%`;
            
            // Color based on progress
            bar.classList.remove('low', 'medium', 'high');
            if (progress < 33) {
                bar.classList.add('low');
            } else if (progress < 66) {
                bar.classList.add('medium');
            } else {
                bar.classList.add('high');
            }
        }

        // Render pending stores table
        function renderPendingStores(stores, currentCycle, currentCycleName) {
            const container = document.getElementById('pendingTableBody');
            
            if (!stores || stores.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">🎉</div>
                        <p>All stores audited!</p>
                    </div>
                `;
                return;
            }

            const cycleDisplay = currentCycleName 
                ? `${currentCycle} (${currentCycleName})` 
                : currentCycle;

            container.innerHTML = `
                <table>
                    <thead>
                        <tr>
                            <th>Store</th>
                            <th>Brand</th>
                            <th>Pending Cycle</th>
                            <th>Last Audit</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${stores.map(store => `
                            <tr>
                                <td class="store-name">${escapeHtml(store.storeName)}</td>
                                <td><span class="brand-badge">${escapeHtml(store.brand || 'N/A')}</span></td>
                                <td><span class="cycle-badge">🔄 ${cycleDisplay}</span></td>
                                <td class="audit-date">${store.lastAuditDate ? formatDate(store.lastAuditDate) + (store.lastAuditCycle ? ' (' + store.lastAuditCycle + ')' : '') : 'Never'}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
        }

        // Render audited stores table
        function renderAuditedStores(stores) {
            const container = document.getElementById('auditedTableBody');
            
            if (!stores || stores.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📋</div>
                        <p>No audits completed yet</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = `
                <table>
                    <thead>
                        <tr>
                            <th>Store</th>
                            <th>Brand</th>
                            <th>Score</th>
                            <th>Date</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${stores.map(store => {
                            const scoreClass = store.score >= 83 ? 'pass' : 'fail';
                            return `
                            <tr>
                                <td class="store-name">${escapeHtml(store.storeName)}</td>
                                <td><span class="brand-badge">${escapeHtml(store.brand || 'N/A')}</span></td>
                                <td><span class="score-badge ${scoreClass}">${store.score}%</span></td>
                                <td class="audit-date">${formatDate(store.auditDate)}</td>
                            </tr>
                        `}).join('')}
                    </tbody>
                </table>
            `;
        }

        // Helper functions
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatDate(dateStr) {
            if (!dateStr) return '-';
            const date = new Date(dateStr);
            return date.toLocaleDateString('en-GB', { 
                day: '2-digit', 
                month: 'short', 
                year: 'numeric' 
            });
        }

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type} show`;
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }
    </script>
</body>
</html>
